<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<title>Graph Demo — force-directed</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0e1012; color: #e0fbfc; font-family: 'Share Tech Mono', monospace; overflow: hidden; }
  #app { position: relative; height: 100vh; }
  #cy { position: absolute; inset: 0; background: rgba(12,18,22,0.95); }
  #panelZone { position: absolute; right: 0; top: 0; bottom: 0; width: 280px; z-index: 5; }
  #panel { position: absolute; right: 0; top: 0; bottom: 0; width: 240px; padding: 16px; background: rgba(8,10,12,0.92); border-left: 1px solid rgba(25,184,190,0.25); display: flex; flex-direction: column; gap: 14px; font-size: 12px; transform: translateX(calc(100% - 14px)); transition: transform 200ms ease; }
  #panel::before { content: ''; position: absolute; left: 0; top: 50%; width: 3px; height: 40px; background: rgba(25,184,190,0.55); transform: translateY(-50%); }
  #panelZone:hover #panel, #panel:focus-within { transform: translateX(0); }
  h2 { margin: 0 0 6px; font-size: 16px; letter-spacing: 1px; color: #19b8be; text-transform: uppercase; }
  label { display: flex; justify-content: space-between; align-items: center; gap: 8px; color: #c9e4e5; }
  input[type=range] { flex: 1; }
  .legend span::before { content: ''; display: inline-block; width: 14px; height: 2px; vertical-align: middle; margin-right: 6px; }
  .legend .f::before { background: #19b8be; }
  .legend .e::before { background: repeating-linear-gradient(90deg, #00ff66 0 4px, transparent 4px 7px); }
  button { background: rgba(25,184,190,0.1); border: 1px solid rgba(25,184,190,0.4); color: #19b8be; padding: 6px 10px; font-family: inherit; font-size: 11px; letter-spacing: 1px; cursor: pointer; text-transform: uppercase; }
  button:hover { background: rgba(25,184,190,0.25); color: #fff; }
  button.on { background: rgba(25,184,190,0.35); color: #fff; border-color: #00e5ff; }
  .row { display: flex; gap: 4px; }
  #tip { position: absolute; bottom: 16px; left: 16px; font-size: 11px; color: #757788; }
  #edgeTip { position: absolute; padding: 14px 20px; background: rgba(8,10,12,0.95); border: 1px solid rgba(25,184,190,0.5); font-size: 15px; line-height: 1.55; display: none; pointer-events: none; transform: translate(-50%, -120%); white-space: nowrap; box-shadow: 0 0 16px rgba(25,184,190,0.3); z-index: 10; min-width: 200px; }
  #edgeTip.on { display: block; }
  #edgeTip .eyebrow { font-size: 11px; letter-spacing: 3px; color: #19b8be; text-transform: uppercase; margin-bottom: 4px; }
  #edgeTip .head { font-size: 19px; color: #fff; margin: 0 0 10px; letter-spacing: 0.5px; }
  #edgeTip .diff-label { font-size: 11px; letter-spacing: 2px; margin-right: 10px; }
  #edgeTip .diff-label.loses { color: #19b8be; }
  #edgeTip .diff-label.gains { color: #00ff66; }
  #edgeTip .diff-text { color: #e0fbfc; font-size: 15px; letter-spacing: 0.3px; }
</style>
<script src="https://unpkg.com/cytoscape@3.30.0/dist/cytoscape.min.js"></script>
<script src="https://unpkg.com/layout-base/layout-base.js"></script>
<script src="https://unpkg.com/cose-base/cose-base.js"></script>
<script src="https://unpkg.com/cytoscape-fcose/cytoscape-fcose.js"></script>
</head>
<body>
<div id="app">
  <div id="cy"></div>
  <div id="panelZone">
  <div id="panel">
    <h2>Forces</h2>
    <label>Repulsion <span id="repVal">4500</span></label>
    <input id="rep" type="range" min="500" max="15000" value="4500" step="100">
    <label>Edge length <span id="lenVal">80</span></label>
    <input id="len" type="range" min="30" max="250" value="80">
    <label>Gravity <span id="gravVal">0.25</span></label>
    <input id="grav" type="range" min="0" max="1" value="0.25" step="0.05">

    <h2>Display</h2>
    <div class="row">
      <button id="fBoth" class="on">BOTH</button>
      <button id="fFor">FORGETS</button>
      <button id="fEmb">EMBEDS</button>
    </div>
    <label style="justify-content:flex-start; gap:6px;">
      <input id="hideIso" type="checkbox"> Hide isolated nodes
    </label>
    <label style="justify-content:flex-start; gap:6px;">
      <input id="transitive" type="checkbox"> Show transitive closure
    </label>
    <label style="justify-content:flex-start; gap:6px;">
      <input id="colorComp" type="checkbox"> Color by component
    </label>
    <button id="reset">RE-LAYOUT</button>

    <div class="legend" style="margin-top:auto">
      <div><span class="f"></span>forgets_to (cyan 실선)</div>
      <div style="margin-top:6px"><span class="e"></span>embeds_into (green 점선)</div>
    </div>
  </div>
  </div>
  <div id="tip">드래그 · 마우스휠 줌 · 노드 클릭: 이웃 하이라이트 · 엣지 클릭: diff 표시 · 빈 배경 클릭 해제 · 우측 가장자리 호버: 설정 패널</div>
  <div id="edgeTip">
    <span class="diff-label" id="ep-label">LOSES</span><span class="diff-text" id="ep-diff">—</span>
  </div>
</div>
<script>
  // 시드: 수학 객체 12개 정도. 대부분 forgets, 일부 embeds.
  const nodes = [
    { id: 'set', label: 'Set', cat: 'foundation' },
    { id: 'magma', label: 'Magma', cat: 'alg' },
    { id: 'semigroup', label: 'Semigroup', cat: 'alg' },
    { id: 'monoid', label: 'Monoid', cat: 'alg' },
    { id: 'group', label: 'Group', cat: 'alg' },
    { id: 'abelian', label: 'Abelian Group', cat: 'alg' },
    { id: 'ring', label: 'Ring', cat: 'alg' },
    { id: 'field', label: 'Field', cat: 'alg' },
    { id: 'module', label: 'Module', cat: 'alg' },
    { id: 'vectorspace', label: 'Vector Space', cat: 'alg' },
    { id: 'topspace', label: 'Topological Space', cat: 'top' },
    { id: 'metric', label: 'Metric Space', cat: 'top' },
    { id: 'normed', label: 'Normed Space', cat: 'top' },
    { id: 'banach', label: 'Banach Space', cat: 'top' },
    { id: 'hilbert', label: 'Hilbert Space', cat: 'top' },
    { id: 'c01', label: 'C[0,1]', cat: 'concrete' },
    { id: 'Z', label: 'ℤ', cat: 'concrete' },
  ];

  const edges = [
    // 망각 (forgets_to) — 대수 체인
    { s: 'magma', t: 'set', rel: 'forget', diff: '이항연산' },
    { s: 'semigroup', t: 'magma', rel: 'forget', diff: '결합법칙 (ab)c = a(bc)' },
    { s: 'monoid', t: 'semigroup', rel: 'forget', diff: '항등원 e' },
    { s: 'group', t: 'monoid', rel: 'forget', diff: '역원 연산 x ↦ x⁻¹' },
    { s: 'abelian', t: 'group', rel: 'forget', diff: '교환법칙 ab = ba' },
    { s: 'ring', t: 'abelian', rel: 'forget', diff: '곱셈 연산과 분배법칙' },
    { s: 'field', t: 'ring', rel: 'forget', diff: '곱셈 역원 (0 제외)' },
    { s: 'module', t: 'abelian', rel: 'forget', diff: '스칼라 작용' },
    { s: 'vectorspace', t: 'module', rel: 'forget', diff: '스칼라가 체(field)라는 제약' },
    // 망각 — 위상 체인
    { s: 'topspace', t: 'set', rel: 'forget', diff: '개집합 공리' },
    { s: 'metric', t: 'topspace', rel: 'forget', diff: '거리함수 d(x,y)' },
    { s: 'normed', t: 'metric', rel: 'forget', diff: '노름 ‖·‖ (벡터 구조 위의)' },
    { s: 'banach', t: 'normed', rel: 'forget', diff: '완비성' },
    { s: 'hilbert', t: 'banach', rel: 'forget', diff: '내적 ⟨·,·⟩' },
    // 망각 — 구체 집합의 기저집합
    { s: 'Z', t: 'set', rel: 'forget', diff: '덧셈·곱셈 구조' },
    { s: 'c01', t: 'set', rel: 'forget', diff: '노름·선형구조 전부' },

    // 포함 (embeds_into)
    { s: 'abelian', t: 'group', rel: 'embed', diff: '교환법칙 ab = ba' },
    { s: 'normed', t: 'vectorspace', rel: 'embed', diff: '노름 ‖·‖' },
    { s: 'hilbert', t: 'vectorspace', rel: 'embed', diff: '내적 ⟨·,·⟩과 완비성' },
    { s: 'c01', t: 'banach', rel: 'embed', diff: 'sup-노름으로 본 완비 구조' },
    { s: 'Z', t: 'ring', rel: 'embed', diff: '환 공리 만족' },
    { s: 'Z', t: 'abelian', rel: 'embed', diff: '덧셈 군 구조' },
  ];

  const CAT_COLOR = {
    foundation: '#aab0b8',
    alg: '#19b8be',
    top: '#ff7ab6',
    concrete: '#ffd24a',
  };

  const cy = cytoscape({
    container: document.getElementById('cy'),
    elements: [
      ...nodes.map(n => ({ data: { id: n.id, label: n.label, cat: n.cat } })),
      ...edges.map((e, i) => ({ data: { id: 'e'+i, source: e.s, target: e.t, rel: e.rel, diff: e.diff || '' } })),
    ],
    style: [
      { selector: 'node', style: {
        'background-color': ele => CAT_COLOR[ele.data('cat')] || '#19b8be',
        'label': 'data(label)',
        'color': '#e0fbfc',
        'font-family': '"Share Tech Mono", monospace',
        'font-size': 10,
        'text-valign': 'bottom',
        'text-margin-y': 4,
        'text-outline-color': '#0e1012',
        'text-outline-width': 2,
        'width': 18, 'height': 18,
        'border-width': 1,
        'border-color': 'rgba(255,255,255,0.2)',
      }},
      { selector: 'node:selected', style: {
        'border-width': 3,
        'border-color': '#00e5ff',
        'width': 24, 'height': 24,
      }},
      { selector: 'node.dim', style: { opacity: 0.2 }},
      { selector: 'edge', style: {
        'width': 1.2,
        'curve-style': 'bezier',
        'target-arrow-shape': 'triangle',
        'arrow-scale': 0.8,
        'opacity': 0.7,
      }},
      { selector: 'edge[rel = "forget"]', style: {
        'line-color': '#19b8be',
        'target-arrow-color': '#19b8be',
      }},
      { selector: 'edge[rel = "embed"]', style: {
        'line-color': '#00ff66',
        'target-arrow-color': '#00ff66',
        'line-style': 'dashed',
      }},
      { selector: 'edge.dim', style: { opacity: 0.08 }},
      { selector: 'edge.hidden', style: { display: 'none' }},
      { selector: 'node.hidden', style: { display: 'none' }},
      { selector: 'edge.transitive', style: {
        'width': 0.8,
        'opacity': 0.35,
        'line-style': 'dotted',
        'arrow-scale': 0.6,
      }},
    ],
    wheelSensitivity: 0.2,
  });

  let currentLayout = null;
  function runLayout() {
    if (currentLayout) currentLayout.stop();
    currentLayout = cy.layout({
      name: 'fcose',
      animate: true,
      animationDuration: 800,
      nodeRepulsion: +document.getElementById('rep').value,
      idealEdgeLength: +document.getElementById('len').value,
      gravity: +document.getElementById('grav').value,
      randomize: false,
      fit: true,
      padding: 40,
    });
    currentLayout.run();
  }
  runLayout();

  // 슬라이더 핸들러
  function bindSlider(id, outId) {
    const el = document.getElementById(id);
    const out = document.getElementById(outId);
    el.addEventListener('input', () => { out.textContent = el.value; runLayout(); });
  }
  bindSlider('rep', 'repVal');
  bindSlider('len', 'lenVal');
  bindSlider('grav', 'gravVal');
  document.getElementById('reset').onclick = runLayout;

  // 필터 토글
  let currentMode = 'BOTH';
  function applyIsolationFilter() {
    const hide = document.getElementById('hideIso').checked;
    cy.nodes().forEach(n => {
      if (!hide) { n.removeClass('hidden'); return; }
      const visibleEdges = n.connectedEdges().filter(e => !e.hasClass('hidden'));
      n.toggleClass('hidden', visibleEdges.length === 0);
    });
  }
  function setFilter(mode) {
    currentMode = mode;
    ['fBoth','fFor','fEmb'].forEach(i => document.getElementById(i).classList.remove('on'));
    document.getElementById({BOTH:'fBoth', FORGETS:'fFor', EMBEDS:'fEmb'}[mode]).classList.add('on');
    const transitiveOn = document.getElementById('transitive')?.checked;
    cy.edges().forEach(e => {
      const rel = e.data('rel');
      const relShow = mode === 'BOTH' || (mode === 'FORGETS' && rel === 'forget') || (mode === 'EMBEDS' && rel === 'embed');
      const isTransitive = !!e.data('transitive');
      const show = relShow && (!isTransitive || transitiveOn);
      e.toggleClass('hidden', !show);
    });
    applyIsolationFilter();
  }
  document.getElementById('fBoth').onclick = () => setFilter('BOTH');
  document.getElementById('fFor').onclick = () => setFilter('FORGETS');
  document.getElementById('fEmb').onclick = () => setFilter('EMBEDS');
  document.getElementById('hideIso').onchange = applyIsolationFilter;

  // 추이적 엣지 계산: 관계별로 reachability를 BFS로 구해 원본에 없는 reachable 쌍을 엣지로 추가.
  function computeTransitiveEdges() {
    const baseByRel = { forget: new Map(), embed: new Map() };
    for (const n of nodes) {
      baseByRel.forget.set(n.id, new Set());
      baseByRel.embed.set(n.id, new Set());
    }
    for (const e of edges) baseByRel[e.rel].get(e.s).add(e.t);

    const seen = new Set(edges.map(e => `${e.s}|${e.t}|${e.rel}`));
    const extra = [];
    for (const rel of ['forget', 'embed']) {
      const adj = baseByRel[rel];
      for (const n of nodes) {
        const reachable = new Set();
        const stack = [...adj.get(n.id)];
        while (stack.length) {
          const cur = stack.pop();
          if (reachable.has(cur)) continue;
          reachable.add(cur);
          for (const nxt of adj.get(cur) || []) stack.push(nxt);
        }
        reachable.delete(n.id);
        for (const t of reachable) {
          const key = `${n.id}|${t}|${rel}`;
          if (!seen.has(key)) {
            seen.add(key);
            extra.push({ s: n.id, t, rel });
          }
        }
      }
    }
    return extra;
  }

  // 추이 엣지를 한 번 계산해서 미리 심고, 기본은 숨김(hidden + transitive 클래스)
  {
    const extra = computeTransitiveEdges();
    extra.forEach((e, i) => {
      cy.add({ data: { id: 'te'+i, source: e.s, target: e.t, rel: e.rel, transitive: true } });
    });
    cy.edges('[?transitive]').addClass('transitive hidden');
  }

  document.getElementById('transitive').onchange = () => {
    const on = document.getElementById('transitive').checked;
    cy.edges('[?transitive]').forEach(e => {
      const rel = e.data('rel');
      const relShow = currentMode === 'BOTH' || (currentMode === 'FORGETS' && rel === 'forget') || (currentMode === 'EMBEDS' && rel === 'embed');
      e.toggleClass('hidden', !(on && relShow));
    });
    applyIsolationFilter();
  };

  // 노드 클릭 → 이웃 하이라이트
  cy.on('tap', 'node', evt => {
    const n = evt.target;
    const nbrs = n.neighborhood().add(n);
    cy.elements().addClass('dim');
    nbrs.removeClass('dim');
    cy.nodes().unselect();
    n.select();
  });
  cy.on('tap', evt => {
    if (evt.target === cy) {
      cy.elements().removeClass('dim');
      cy.nodes().unselect();
      closeEdgeTip();
    }
  });

  // 엣지 클릭 → 해당 엣지·두 끝점만 남기고 dim + 툴팁을 엣지 중점 위에 표시
  let selectedEdge = null;
  function positionEdgeTip() {
    if (!selectedEdge) return;
    const src = selectedEdge.source().renderedPosition();
    const tgt = selectedEdge.target().renderedPosition();
    const cyBox = document.getElementById('cy').getBoundingClientRect();
    const x = cyBox.left + (src.x + tgt.x) / 2;
    const y = cyBox.top + (src.y + tgt.y) / 2;
    const tip = document.getElementById('edgeTip');
    tip.style.left = x + 'px';
    tip.style.top = y + 'px';
  }
  cy.on('tap', 'edge', evt => {
    const e = evt.target;
    selectedEdge = e;
    const rel = e.data('rel');
    const diff = e.data('diff') || '(없음)';
    const labelEl = document.getElementById('ep-label');
    labelEl.textContent = rel === 'forget' ? 'LOSES' : 'GAINS';
    labelEl.className = 'diff-label ' + (rel === 'forget' ? 'loses' : 'gains');
    document.getElementById('ep-diff').textContent = diff;
    document.getElementById('edgeTip').classList.add('on');

    // dim: 엣지와 두 끝점 외 전부 흐리게
    cy.elements().addClass('dim');
    e.removeClass('dim');
    e.source().removeClass('dim');
    e.target().removeClass('dim');

    positionEdgeTip();
  });
  function closeEdgeTip() {
    selectedEdge = null;
    document.getElementById('edgeTip').classList.remove('on');
  }
  // 팬/줌 시 툴팁 위치 갱신
  cy.on('pan zoom render', positionEdgeTip);

  // 연결성분(약연결) 색 계산
  const COMP_PALETTE = ['#19b8be', '#ff7ab6', '#ffd24a', '#9ae6b4', '#c4a0ff', '#ff9a8b', '#87ceeb'];
  function recomputeComponents() {
    const on = document.getElementById('colorComp').checked;
    if (!on) {
      cy.nodes().forEach(n => n.style('background-color', '#19b8be'));
      return;
    }
    const visibleNodes = cy.nodes().filter(n => !n.hasClass('hidden'));
    const visibleEdges = cy.edges().filter(e => !e.hasClass('hidden'));
    const adj = new Map();
    visibleNodes.forEach(n => adj.set(n.id(), new Set()));
    visibleEdges.forEach(e => {
      const s = e.data('source'), t = e.data('target');
      adj.get(s)?.add(t);
      adj.get(t)?.add(s);
    });
    const compOf = new Map();
    let cid = 0;
    for (const [id] of adj) {
      if (compOf.has(id)) continue;
      const stack = [id];
      while (stack.length) {
        const cur = stack.pop();
        if (compOf.has(cur)) continue;
        compOf.set(cur, cid);
        for (const nxt of adj.get(cur)) stack.push(nxt);
      }
      cid++;
    }
    cy.nodes().forEach(n => {
      const c = compOf.get(n.id());
      const color = c === undefined ? '#555' : COMP_PALETTE[c % COMP_PALETTE.length];
      n.style('background-color', color);
    });
  }
  document.getElementById('colorComp').onchange = recomputeComponents;

  // 필터·추이·격리 필터 변경 시 컴포넌트 색도 갱신
  const origSetFilter = setFilter;
  setFilter = function(m) { origSetFilter(m); recomputeComponents(); };
  const origIso = applyIsolationFilter;
  applyIsolationFilter = function() { origIso(); recomputeComponents(); };
  const origTrans = document.getElementById('transitive').onchange;
  document.getElementById('transitive').onchange = function() { origTrans(); recomputeComponents(); };
  // 버튼 onclick이 setFilter 참조이므로 재바인딩
  document.getElementById('fBoth').onclick = () => setFilter('BOTH');
  document.getElementById('fFor').onclick = () => setFilter('FORGETS');
  document.getElementById('fEmb').onclick = () => setFilter('EMBEDS');
  document.getElementById('hideIso').onchange = applyIsolationFilter;

  // 드래그 중 이웃이 약간 따라오게 (가상의 끈)
  cy.on('drag', 'node', evt => {
    if (!currentLayout || currentLayout.stopped) return;
  });
</script>
</body>
</html>
